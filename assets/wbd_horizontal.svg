<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <!-- Blue background -->
  <rect width="520" height="120" fill="#003087" rx="4"/>

  <!-- WB Shield -->
  <!-- Outer shield gold -->
  <path d="M28 8 L82 26 L82 72 Q82 100 55 112 Q28 100 28 72 Z"
        fill="#F5A800"/>
  <!-- Inner shield blue -->
  <path d="M28 8 L82 26 L82 72 Q82 100 55 112 Q28 100 28 72 Z"
        fill="#003087"/>
  <!-- Redraw properly -->
  <!-- Gold outer shield shape -->
  <path d="M55 10 L88 24 L88 74 Q88 102 55 114 Q22 102 22 74 L22 24 Z"
        fill="#F5A800"/>
  <!-- Blue inner fill -->
  <path d="M55 18 L80 30 L80 74 Q80 98 55 108 Q30 98 30 74 L30 30 Z"
        fill="#003087"/>
  <!-- Gold inner ring line -->
  <path d="M55 22 L77 33 L77 74 Q77 96 55 106 Q33 96 33 74 L33 33 Z"
        fill="none" stroke="#F5A800" stroke-width="2.5"/>
  <!-- WB text in shield -->
  <text x="55" y="78"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="36"
        font-weight="900"
        fill="#F5A800"
        letter-spacing="-1">WB</text>

  <!-- Vertical divider -->
  <line x1="105" y1="25" x2="105" y2="95" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- WARNER BROS. text -->
  <text x="122" y="57"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="1.5">WARNER BROS.</text>

  <!-- DISCOVERY text -->
  <text x="122" y="85"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="1.5">DISCOVERY</text>
</svg>
